[build]
  publish = "dist"

[dev]
  port = 8888
  targetPort = 5173

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

# Proxy to VPS (Fixes Mixed Content/HTTPS issues)
[[redirects]]
  from = "/api/*"
  to = "http://87.106.166.66:3000/api/:splat"
  status = 200
  force = true

# Static Asset Headers
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/critical.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Global Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
