backend:
  name: git-gateway
  repo: webwing-agency/webwing-website
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/ea541a53-412d-4947-b8a3-ccba711da4ff/pkce
  auth_token_endpoint: /sites/ea541a53-412d-4947-b8a3-ccba711da4ff/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://webwing.agency

media_folder: "public/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "globals"
    label: "Globale Inhalte"
    files:
      - label: "Header & Footer"
        name: "site"
        file: "public/data/site.json"
        format: json
        fields:
          - label: "Header"
            name: "header"
            widget: "object"
            fields:
              - { name: "status_text", label: "Status-Text", widget: "string" }
              - label: "Header-Navigation"
                name: "nav_links"
                widget: "list"
                fields:
                  - { name: "label", widget: "string" }
                  - { name: "href", widget: "string" }
                  - { name: "is_cta", widget: "boolean", required: false, default: false }
              - label: "Popup-Navigation"
                name: "popup_links"
                widget: "list"
                fields:
                  - { name: "label", widget: "string" }
                  - { name: "href", widget: "string" }
              - { name: "popup_brand_text", label: "Popup Brand-Text", widget: "string" }
              - { name: "email", label: "Popup E-Mail", widget: "string" }
              - { name: "phone", label: "Popup Telefon", widget: "string" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { name: "slogan", widget: "string" }
              - { name: "about", widget: "text" }
              - { name: "copyright", widget: "string" }
              - label: "Footer-Navigation"
                name: "nav_links"
                widget: "list"
                fields:
                  - { name: "label", widget: "string" }
                  - { name: "href", widget: "string" }
              - label: "Rechtliche Links"
                name: "legal_links"
                widget: "list"
                fields:
                  - { name: "label", widget: "string" }
                  - { name: "href", widget: "string" }

  - name: "home"
    label: "Homepage Content"
    label_singular: "Home"
    editor:
      preview: false
    files:
      - label: "Homepage JSON"
        name: "home_json"
        file: "public/data/index.json"
        format: json
        fields:
          - { name: "meta_title", label: "HTML <title>", widget: "string" }
          - { name: "meta_description", label: "Meta description", widget: "text" }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { name: "title_html", label: "Hero title (HTML)", widget: "text" }
              - { name: "subtitle", label: "Hero subtitle", widget: "text" }
              - { name: "cta_text", label: "Hero CTA text", widget: "string" }
              - { name: "cta_link", label: "Hero CTA link", widget: "string" }
              - { name: "hero_image", label: "Hero background image path", widget: "string" }
              - label: "Marquee-Items"
                name: "capability_items"
                widget: "list"
                field: { name: "item", widget: "string" }
          - label: "Sektionstexte"
            name: "sections"
            widget: "object"
            fields:
              - { name: "expertise_title", widget: "string" }
              - { name: "expertise_link_label", widget: "string" }
              - { name: "expertise_link", widget: "string" }
              - { name: "projects_title", widget: "string" }
              - { name: "projects_link_label", widget: "string" }
              - { name: "projects_link", widget: "string" }
              - { name: "reviews_title", widget: "string" }
          - label: "Expertise cards"
            name: "expertise"
            widget: "list"
            fields:
              - { name: "key", widget: "string", required: false }
              - { name: "icon", widget: "string" }
              - { name: "title", widget: "string" }
              - { name: "text", widget: "text" }
          - label: "Projects (homepage)"
            name: "projects"
            widget: "list"
            fields:
              - { name: "image", widget: "string" }
              - { name: "title", widget: "string" }
              - { name: "text", widget: "text" }
              - { name: "tags", widget: "list", field: { name: "tag", widget: "string" } }
          - label: "Reviews"
            name: "reviews"
            widget: "list"
            fields:
              - { name: "client_img", widget: "string" }
              - { name: "client_name", widget: "string" }
              - { name: "corporation_name", widget: "string" }
              - { name: "text", widget: "text" }
              - { name: "star_count", widget: "number", default: 5 }
          - label: "Home Kontakt"
            name: "contact"
            widget: "object"
            fields:
              - { name: "email", widget: "string" }
              - { name: "phone", widget: "string" }
              - { name: "booking_api_base", label: "Booking API base", widget: "string", required: false }
          - label: "Booking-Widget"
            name: "book_section"
            widget: "object"
            fields:
              - { name: "title", widget: "string" }
              - { name: "text", widget: "text" }
              - label: "Formular"
                name: "form"
                widget: "object"
                fields:
                  - label: "Labels"
                    name: "labels"
                    widget: "object"
                    fields:
                      - { name: "name", widget: "string" }
                      - { name: "email", widget: "string" }
                      - { name: "phone", widget: "string" }
                      - { name: "date", widget: "string" }
                      - { name: "time", widget: "string" }
                  - label: "Placeholders"
                    name: "placeholders"
                    widget: "object"
                    fields:
                      - { name: "name", widget: "string" }
                      - { name: "email", widget: "string" }
                      - { name: "phone", widget: "string" }
                  - label: "Kalender"
                    name: "calendar"
                    widget: "object"
                    fields:
                      - { name: "weekdays", widget: "list", field: { name: "weekday", widget: "string" } }
                      - { name: "empty_times", widget: "string" }
                  - label: "Button"
                    name: "button"
                    widget: "object"
                    fields:
                      - { name: "submit", widget: "string" }
                      - { name: "loading", widget: "string" }
                  - label: "Meldungen"
                    name: "messages"
                    widget: "object"
                    fields:
                      - { name: "name_required", widget: "string" }
                      - { name: "email_invalid", widget: "string" }
                      - { name: "slot_required", widget: "string" }
                      - { name: "success", widget: "string" }
                      - { name: "error_prefix", widget: "string" }
                      - { name: "error_fallback", widget: "string" }
                      - { name: "network_error", widget: "string" }

  - name: "pages"
    label: "Pages"
    label_singular: "Page"
    files:
      - label: "Dienstleistungen (Services)"
        name: "services"
        file: "public/data/services.json"
        format: json
        fields:
          - { name: "meta_title", widget: "string" }
          - { name: "meta_description", widget: "text" }
          - { name: "page_title", widget: "string" }
          - label: "Filters"
            name: "filters"
            widget: "list"
            field: { name: "filter", widget: "string" }
          - label: "Service cards"
            name: "services"
            widget: "list"
            fields:
              - { name: "images", label: "Image paths", widget: "list", field: { name: "image", widget: "string" } }
              - { name: "title", widget: "string" }
              - { name: "description", widget: "text" }
              - label: "Specs"
                name: "specs"
                widget: "list"
                fields:
                  - { name: "text", label: "Text", widget: "string" }
                  - { name: "icon", label: "Font Awesome class", widget: "string", hint: "z.B. fa-solid fa-pen-ruler" }
              - label: "CTAs"
                name: "ctas"
                widget: "object"
                fields:
                  - { name: "more_link", widget: "string", required: false }
                  - { name: "contact_link", widget: "string", required: false }
          - { name: "cta_text", widget: "string" }
          - { name: "cta_label", widget: "string" }
          - { name: "cta_link", widget: "string" }
          - label: "UI-Texte"
            name: "ui"
            widget: "object"
            fields:
              - { name: "search_placeholder", widget: "string" }
              - { name: "card_cta_more_text", widget: "string" }
              - { name: "card_cta_contact_text", widget: "string" }
              - { name: "empty_state_default", widget: "string" }
              - { name: "empty_state_query_prefix", widget: "string" }
              - { name: "empty_state_query_suffix", widget: "string" }
              - { name: "results_count_template", widget: "string" }

      - label: "Referenzen (Projects)"
        name: "projects"
        file: "public/data/projects.json"
        format: json
        fields:
          - { name: "meta_title", widget: "string" }
          - { name: "meta_description", widget: "text" }
          - { name: "page_title", widget: "string" }
          - label: "Filters"
            name: "filters"
            widget: "list"
            field: { name: "filter", widget: "string" }
          - label: "Project items"
            name: "projects"
            widget: "list"
            fields:
              - { name: "images", label: "Image paths", widget: "list", field: { name: "image", widget: "string" } }
              - { name: "title", widget: "string" }
              - { name: "description", widget: "text" }
              - label: "Specs"
                name: "specs"
                widget: "list"
                fields:
                  - { name: "text", label: "Text", widget: "string" }
                  - { name: "icon", label: "Font Awesome class", widget: "string", hint: "z.B. fa-solid fa-pen-ruler" }
              - label: "CTAs"
                name: "ctas"
                widget: "object"
                fields:
                  - { name: "more_link", widget: "string", required: false }
                  - { name: "contact_link", widget: "string", required: false }
          - { name: "cta_text", widget: "string" }
          - { name: "cta_label", widget: "string" }
          - { name: "cta_link", widget: "string" }
          - label: "UI-Texte"
            name: "ui"
            widget: "object"
            fields:
              - { name: "search_placeholder", widget: "string" }
              - { name: "card_cta_more_text", widget: "string" }
              - { name: "card_cta_contact_text", widget: "string" }
              - { name: "empty_state_default", widget: "string" }
              - { name: "empty_state_query_prefix", widget: "string" }
              - { name: "empty_state_query_suffix", widget: "string" }
              - { name: "results_count_template", widget: "string" }

      - label: "Kontakt"
        name: "kontakt"
        file: "public/data/contact.json"
        format: json
        fields:
          - { name: "meta_title", widget: "string" }
          - { name: "meta_description", widget: "text" }
          - { name: "page_title", widget: "string" }
          - { name: "subtitle", widget: "text" }
          - { name: "card_title", widget: "string" }
          - { name: "card_text", widget: "text" }
          - { name: "contact_person", widget: "string" }
          - { name: "email", widget: "string" }
          - { name: "phone", widget: "string" }
          - { name: "contact_api_base", widget: "string", required: false }
          - { name: "turnstile_sitekey", label: "Cloudflare Turnstile sitekey", widget: "string", required: false }
          - label: "Formular"
            name: "form"
            widget: "object"
            fields:
              - label: "Labels"
                name: "labels"
                widget: "object"
                fields:
                  - { name: "name", widget: "string" }
                  - { name: "email", widget: "string" }
                  - { name: "phone", widget: "string" }
                  - { name: "message", widget: "string" }
              - label: "Placeholders"
                name: "placeholders"
                widget: "object"
                fields:
                  - { name: "name", widget: "string" }
                  - { name: "email", widget: "string" }
                  - { name: "phone", widget: "string" }
                  - { name: "message", widget: "string" }
              - label: "Button"
                name: "button"
                widget: "object"
                fields:
                  - { name: "submit", widget: "string" }
                  - { name: "loading", widget: "string" }
              - label: "Meldungen"
                name: "messages"
                widget: "object"
                fields:
                  - { name: "required", widget: "string" }
                  - { name: "success", widget: "string" }
                  - { name: "error_prefix", widget: "string" }
                  - { name: "error_fallback", widget: "string" }
                  - { name: "network_error", widget: "string" }

      - label: "Kostenloses Erstgespräch"
        name: "book_call"
        file: "public/data/book-call.json"
        format: json
        fields:
          - { name: "meta_title", widget: "string" }
          - { name: "meta_description", widget: "text" }
          - { name: "page_title", widget: "string" }
          - { name: "subtitle", widget: "text" }
          - { name: "card_title", widget: "string" }
          - { name: "card_text", widget: "text" }
          - { name: "email", widget: "string" }
          - { name: "phone", widget: "string" }
          - { name: "booking_api_base", widget: "string", required: false }
          - label: "Formular"
            name: "form"
            widget: "object"
            fields:
              - label: "Labels"
                name: "labels"
                widget: "object"
                fields:
                  - { name: "name", widget: "string" }
                  - { name: "email", widget: "string" }
                  - { name: "phone", widget: "string" }
                  - { name: "date", widget: "string" }
                  - { name: "time", widget: "string" }
              - label: "Placeholders"
                name: "placeholders"
                widget: "object"
                fields:
                  - { name: "name", widget: "string" }
                  - { name: "email", widget: "string" }
                  - { name: "phone", widget: "string" }
              - label: "Kalender"
                name: "calendar"
                widget: "object"
                fields:
                  - { name: "weekdays", widget: "list", field: { name: "weekday", widget: "string" } }
                  - { name: "empty_times", widget: "string" }
              - label: "Button"
                name: "button"
                widget: "object"
                fields:
                  - { name: "submit", widget: "string" }
                  - { name: "loading", widget: "string" }
              - label: "Meldungen"
                name: "messages"
                widget: "object"
                fields:
                  - { name: "name_required", widget: "string" }
                  - { name: "email_invalid", widget: "string" }
                  - { name: "slot_required", widget: "string" }
                  - { name: "success", widget: "string" }
                  - { name: "error_prefix", widget: "string" }
                  - { name: "error_fallback", widget: "string" }
                  - { name: "network_error", widget: "string" }

      - label: "Impressum"
        name: "impressum"
        file: "public/data/impressum.json"
        format: json
        fields:
          - { name: "meta_title", widget: "string" }
          - { name: "meta_description", widget: "text" }
          - { name: "page_title", widget: "string" }
          - { name: "content_html", label: "Impressum HTML", widget: "markdown" }

      - label: "Datenschutzerklärung"
        name: "privacy"
        file: "public/data/privacy.json"
        format: json
        fields:
          - { name: "meta_title", widget: "string" }
          - { name: "meta_description", widget: "text" }
          - { name: "page_title", widget: "string" }
          - { name: "content_html", label: "Privacy HTML / Markdown", widget: "markdown" }

      - label: "AGB"
        name: "agb"
        file: "public/data/agb.json"
        format: json
        fields:
          - { name: "meta_title", widget: "string" }
          - { name: "meta_description", widget: "text" }
          - { name: "page_title", widget: "string" }
          - { name: "content_html", label: "AGB HTML / Markdown", widget: "markdown" }
