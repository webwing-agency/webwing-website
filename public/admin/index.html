<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>

    <!-- Wichtig für Manual Init -->
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>

    <!-- Decap CMS laden -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </head>

  <body>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        if (window.CMS) {
          window.CMS.init({
            config: {
              backend: {
                name: "git-gateway",
                repo: "webwing-agency/webwing-website",
                branch: "main"
              },

              site_url: "https://webwing.agency",
              display_url: "https://webwing.agency",

              media_folder: "images/uploads",
              public_folder: "/images/uploads",

              collections: [
                {
                  name: "home",
                  label: "Homepage Content",
                  label_singular: "Home",
                  editor: {
                    preview: false
                  },
                  files: [
                    {
                      label: "Homepage JSON",
                      name: "home_json",
                      file: "public/data/index.json",
                      format: "json",
                      fields: [
                        { name: "meta_title", label: "HTML <title>", widget: "string" },
                        { name: "meta_description", label: "Meta description", widget: "text" },
                        {
                          label: "Hero",
                          name: "hero",
                          widget: "object",
                          fields: [
                            { name: "title_html", label: "Hero title (HTML)", widget: "text" },
                            { name: "subtitle", widget: "text" },
                            { name: "cta_text", widget: "string" },
                            { name: "cta_link", widget: "string" },
                            { name: "hero_image", widget: "string" }
                          ]
                        },
                        {
                          label: "Expertise cards",
                          name: "expertise",
                          widget: "list",
                          fields: [
                            { name: "key", widget: "string", required: false },
                            { name: "icon", widget: "string" },
                            { name: "title", widget: "string" },
                            { name: "text", widget: "text" }
                          ]
                        }
                      ]
                    }
                  ]
                },

                {
                  name: "pages",
                  label: "Pages",
                  label_singular: "Page",
                  files: [
                    {
                      label: "Dienstleistungen",
                      name: "services",
                      file: "public/data/services.json",
                      format: "json",
                      fields: [
                        { name: "meta_title", widget: "string" },
                        { name: "meta_description", widget: "text" },
                        { name: "page_title", widget: "string" }
                      ]
                    }
                  ]
                }
              ]
            }
          });
        } else {
          console.error("Decap CMS konnte nicht geladen werden.");
        }
      });
    </script>
  </body>
</html>
