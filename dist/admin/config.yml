backend:
  name: git-gateway
  repo: webwing-agency/webwing-website
  branch: main

site_url: https://webwing.agency
display_url: https://webwing.agency

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "home"
    label: "Homepage Content"
    label_singular: "Home"
    editor:
      preview: false
    files:
      - label: "Homepage JSON"
        name: "home_json"
        file: "public/data/index.json"
        format: json
        fields:
          - { name: "meta_title", label: "HTML <title>", widget: "string" }
          - { name: "meta_description", label: "Meta description", widget: "text" }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { name: "title_html", label: "Hero title (HTML)", widget: "text" }
              - { name: "subtitle", label: "Hero subtitle", widget: "text" }
              - { name: "cta_text", label: "Hero CTA text", widget: "string" }
              - { name: "cta_link", label: "Hero CTA link", widget: "string" }
              - { name: "hero_image", label: "Hero background image path", widget: "string" }

          - label: "Expertise cards"
            name: "expertise"
            widget: "list"
            fields:
              - { name: "key", widget: "string", required: false }
              - { name: "icon", widget: "string" }
              - { name: "title", widget: "string" }
              - { name: "text", widget: "text" }
          - label: "Projects (homepage)"
            name: "projects"
            widget: "list"
            fields:
              - { name: "image", widget: "string" }
              - { name: "title", widget: "string" }
              - { name: "text", widget: "text" }
              - { name: "tags", widget: "list", field: { name: "tag", widget: "string" } }
          - label: "Reviews"
            name: "reviews"
            widget: "list"
            fields:
              - { name: "client_img", widget: "string" }
              - { name: "client_name", widget: "string" }
              - { name: "corporation_name", widget: "string" }
              - { name: "text", widget: "text" }
              - { name: "star_count", widget: "number", default: 5 }
          - label: "Home Kontakt"
            name: "contact"
            widget: "object"
            fields:
              - { name: "email", widget: "string" }
              - { name: "phone", widget: "string" }
          - label: "Booking-Widget"
            name: "book_section"
            widget: "object"
            fields:
              - { name: "title", widget: "string" }
              - { name: "text", widget: "text" }

  - name: "pages"
    label: "Pages"
    label_singular: "Page"
    files:
      - label: "Dienstleistungen (Services)"
        name: "services"
        file: "public/data/services.json"
        format: json
        fields:
          - { name: "meta_title", widget: "string" }
          - { name: "meta_description", widget: "text" }
          - { name: "page_title", widget: "string" }
          - label: "Filters"
            name: "filters"
            widget: "list"
            field: { name: "filter", widget: "string" }
          - label: "Service cards"
            name: "services"
            widget: "list"
            fields:
              - { name: "images", label: "Image paths", widget: "list", field: { name: "image", widget: "string" } }
              - { name: "title", widget: "string" }
              - { name: "description", widget: "text" }
              - label: "Specs"
                name: "specs"
                widget: "list"
                fields:
                  - { name: "text", label: "Text", widget: "string" }
                  - { name: "icon", label: "Font Awesome class", widget: "string", hint: "z.B. fa-solid fa-pen-ruler" }
              - label: "CTAs"
                name: "ctas"
                widget: "object"
                fields:
                  - { name: "more_link", widget: "string", required: false }
                  - { name: "contact_link", widget: "string", required: false }
          - { name: "cta_text", widget: "string" }
          - { name: "cta_label", widget: "string" }
          - { name: "cta_link", widget: "string" }

      - label: "Referenzen (Projects)"
        name: "projects"
        file: "public/data/projects.json"
        format: json
        fields:
          - { name: "meta_title", widget: "string" }
          - { name: "meta_description", widget: "text" }
          - { name: "page_title", widget: "string" }
          - label: "Filters"
            name: "filters"
            widget: "list"
            field: { name: "filter", widget: "string" }
          - label: "Project items"
            name: "projects"
            widget: "list"
            fields:
              - { name: "images", label: "Image paths", widget: "list", field: { name: "image", widget: "string" } }
              - { name: "title", widget: "string" }
              - { name: "description", widget: "text" }
              - label: "Specs"
                name: "specs"
                widget: "list"
                fields:
                  - { name: "text", label: "Text", widget: "string" }
                  - { name: "icon", label: "Font Awesome class", widget: "string", hint: "z.B. fa-solid fa-pen-ruler" }
              - label: "CTAs"
                name: "ctas"
                widget: "object"
                fields:
                  - { name: "more_link", widget: "string", required: false }
                  - { name: "contact_link", widget: "string", required: false }
          - { name: "cta_text", widget: "string" }
          - { name: "cta_label", widget: "string" }
          - { name: "cta_link", widget: "string" }

      - label: "Kontakt"
        name: "kontakt"
        file: "public/data/contact.json"
        format: json
        fields:
          - { name: "meta_title", widget: "string" }
          - { name: "meta_description", widget: "text" }
          - { name: "page_title", widget: "string" }
          - { name: "subtitle", widget: "text" }
          - { name: "card_title", widget: "string" }
          - { name: "card_text", widget: "text" }
          - { name: "contact_person", widget: "string" }
          - { name: "email", widget: "string" }
          - { name: "phone", widget: "string" }
          - { name: "turnstile_sitekey", label: "Cloudflare Turnstile sitekey", widget: "string", required: false }

      - label: "Kostenloses Erstgespräch"
        name: "book_call"
        file: "public/data/book-call.json"
        format: json
        fields:
          - { name: "meta_title", widget: "string" }
          - { name: "meta_description", widget: "text" }
          - { name: "page_title", widget: "string" }
          - { name: "subtitle", widget: "text" }
          - { name: "card_title", widget: "string" }
          - { name: "card_text", widget: "text" }
          - { name: "email", widget: "string" }
          - { name: "phone", widget: "string" }

      - label: "Impressum"
        name: "impressum"
        file: "public/data/impressum.json"
        format: json
        fields:
          - { name: "meta_title", widget: "string" }
          - { name: "meta_description", widget: "text" }
          - { name: "page_title", widget: "string" }
          - { name: "content_html", label: "Impressum HTML", widget: "markdown" }

      - label: "Datenschutzerklärung"
        name: "privacy"
        file: "public/data/privacy.json"
        format: json
        fields:
          - { name: "meta_title", widget: "string" }
          - { name: "meta_description", widget: "text" }
          - { name: "page_title", widget: "string" }
          - { name: "content_html", label: "Privacy HTML / Markdown", widget: "markdown" }

      - label: "AGB"
        name: "agb"
        file: "public/data/agb.json"
        format: json
        fields:
          - { name: "meta_title", widget: "string" }
          - { name: "meta_description", widget: "text" }
          - { name: "page_title", widget: "string" }
          - { name: "content_html", label: "AGB HTML / Markdown", widget: "markdown" }
